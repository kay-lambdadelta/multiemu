[package]
name = "multiemu-runtime"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-or-later"

[dependencies]
multiemu-rom = { workspace = true }
multiemu-input = { workspace = true }
multiemu-save = { workspace = true }
multiemu-audio = { workspace = true }
rangemap = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
bitvec = { workspace = true }
num = { workspace = true }
nalgebra = { workspace = true }
palette = { workspace = true }
rustc-hash = { workspace = true }
data-encoding = { workspace = true }
bincode = { workspace = true }
versions = { workspace = true }
smallvec = { workspace = true }
scc = { workspace = true }
ringbuffer = { workspace = true }
arc-swap = { workspace = true }
sealed = { workspace = true }
vulkano = { workspace = true, optional = true }
glow = { workspace = true, optional = true }
naga = { workspace = true, optional = true }

[features]
vulkan = ["dep:vulkano", "dep:naga", "naga/spv-out"]
opengl = ["dep:glow", "dep:naga", "naga/glsl-out"]
